name: گواستنەوەی_سەلامەت_بۆ_سێرڤەر

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینکی ڤیدیۆکە لێرە دابنێ'
        required: true
      movie_id_input:
        description: 'ئایدی فیلمەکە یان لینکەکەی'
        required: true
      firebase_section:
        description: 'ناوی بەشەکە (movies1 یان series1 یان subtitled_movies1)'
        required: true
        default: 'movies1'

jobs:
  upload_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: ئامادەکردنی_ئامرازەکان
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q yt-dlp curl_cffi huggingface_hub requests

      - name: داونلۆدکردنی_ڤیدیۆ
        run: |
          yt-dlp --impersonate chrome \
                 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                 --retries 50 \
                 --fragment-retries 50 \
                 --retry-sleep 10 \
                 --sleep-requests 0.5 \
                 --limit-rate 5M \
                 --skip-unavailable-fragments \
                 --ignore-errors \
                 --continue \
                 --merge-output-format mp4 \
                 -o "video.mp4" \
                 "${{ github.event.inputs.video_url }}" || true

      - name: ناردن_بۆ_سێرڤەر_و_پشکنینی_داتابەیس
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: |
          python3 -c "
          import os
          import requests
          import re
          from huggingface_hub import HfApi

          raw_id = '${{ github.event.inputs.movie_id_input }}'
          match = re.search(r'\d+', raw_id)
          if not match:
              print('هەڵە: هیچ ژمارەیەک لە ئایدییەکەدا نەدۆزرایەوە!')
              exit(1)
          
          clean_id = match.group()
          print(f'ئایدی فیلمەکە: {clean_id}')

          file_name = f'film_{clean_id}.mp4'
          token = os.getenv('HF_TOKEN')
          fb_secret = os.getenv('FIREBASE_SECRET')
          tmdb_key = os.getenv('TMDB_KEY')
          repo_id = 'Sarko57/sarko987'
          section = '${{ github.event.inputs.firebase_section }}'

          api = HfApi()
          if os.path.exists('video.mp4'):
              api.upload_file(
                  path_or_fileobj='video.mp4',
                  path_in_repo=file_name,
                  repo_id=repo_id,
                  repo_type='dataset',
                  token=token
              )
              print('ڤیدیۆکە بە سەرکەوتوویی نێردرا.')

              hf_link = f'https://huggingface.co/datasets/Sarko57/sarko987/resolve/main/{file_name}'
              firebase_node_url = f'https://sarko-43d61-default-rtdb.firebaseio.com/{section}/{clean_id}.json?auth={fb_secret}'
              
              # ١. هێنانی هەڵسەنگاندن 
              fetched_imdb = 0.0
              if tmdb_key:
                  tmdb_url = f'https://api.themoviedb.org/3/movie/{clean_id}?api_key={tmdb_key}'
                  res = requests.get(tmdb_url)
                  if res.status_code == 200:
                      fetched_imdb = round(res.json().get('vote_average', 0.0), 1)
                  else:
                      tmdb_url_tv = f'https://api.themoviedb.org/3/tv/{clean_id}?api_key={tmdb_key}'
                      res_tv = requests.get(tmdb_url_tv)
                      if res_tv.status_code == 200:
                          fetched_imdb = round(res_tv.json().get('vote_average', 0.0), 1)
              
              print(f'نرخی هەڵسەنگاندن دۆزرایەوە: {fetched_imdb}')

              # ٢. سەرەتا زانیارییەکانی ئێستا دەخوێنینەوە
              get_response = requests.get(firebase_node_url)
              current_data = get_response.json()
              if current_data is None:
                  current_data = {}
                  
              # ٣. ئەو داتایانەی کە دڵنیاین دەبێت بنێردرێن
              patch_data = {'url': hf_link}
              
              # ئەگەر نرخەکە سفر نەبوو یان پێشتر نەنووسرابوو، تازەی دەکەینەوە
              if 'imdb' not in current_data or current_data['imdb'] == 0.0 or current_data['imdb'] == 0:
                  patch_data['imdb'] = fetched_imdb
              
              # ٤. لیستی ئەو کلیلانەی کە پێویستن و بەها بنەڕەتییەکانیان
              required_keys = {
                  'subtitleKurdish': '',
                  'subtitleEnglish': '',
                  'hasSubtitle': False,
                  'description': '',
                  'badge_text': '',
                  'introEndTime': 0
              }
              
              # ٥. پشکنین دەکەین، ئەگەر هەر کلیلێک نەبوو، بۆی زیاد دەکەین
              for key, default_value in required_keys.items():
                  if key not in current_data:
                      patch_data[key] = default_value
                      print(f'کلیلی کەمبوو زیادکرا: {key}')
              
              # ٦. لە کۆتاییدا داتاکان بە سەلامەتی نوێ دەکەینەوە
              response = requests.patch(firebase_node_url, json=patch_data)
              
              if response.status_code == 200:
                  print('داتابەیس بە سەرکەوتوویی و زیرەکانە نوێکرایەوە!')
              else:
                  print('هەڵە لە نوێکردنەوەی داتابەیس.')
          else:
              print('ڤیدیۆکە نەدۆزرایەوە.')
              exit(1)
          "
